<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>h-tree demo</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { max-width: 520px; margin: 2rem auto; padding: 0 1rem; font-family: system-ui, sans-serif; color: #222; }
        h1   { margin-bottom: .25rem; }
        p    { color: #555; margin-top: 0; }
        pre  { background: #f4f4f5; padding: .75rem; border-radius: 4px; font-size: .85rem; }
        .panel { margin-top: 1.5rem; }
    </style>
</head>
<body>
    <h1>h-tree demo</h1>
    <p>Click triangles to expand. Click labels to toggle. Parent state derives from children.</p>

    <div id="tree"></div>

    <div class="panel">
        <h2>Selected leaves</h2>
        <pre id="out">[]</pre>
    </div>

    <script type="module">
        import { TreeView } from './src/tree-view.js';

        const data = [
            { id: 'docs', text: 'Documents', expanded: true, items: [
                { id: 'docs/work', text: 'Work', expanded: true, items: [
                    { id: 'docs/work/q1', text: 'Q1 Report' },
                    { id: 'docs/work/q2', text: 'Q2 Report' },
                    { id: 'docs/work/q3', text: 'Q3 Report' },
                ]},
                { id: 'docs/personal', text: 'Personal', items: [
                    { id: 'docs/personal/cv',     text: 'CV.pdf' },
                    { id: 'docs/personal/recipe', text: "Grandma's recipe" },
                ]},
            ]},
            { id: 'pictures', text: 'Pictures', items: [
                { id: 'pictures/holiday',  text: 'Holiday'  },
                { id: 'pictures/weddings', text: 'Weddings' },
                { id: 'pictures/pets',     text: 'Pets'     },
            ]},
            { id: 'music', text: 'Music (leaf)' },
        ];

        const out = document.getElementById('out');
        const initial = ['docs/work/q1', 'pictures/holiday'];

        new TreeView({
            el: '#tree',
            data,
            selected: initial,
            onChange: (ids) => { out.textContent = JSON.stringify(ids, null, 2); },
        });
        out.textContent = JSON.stringify(initial, null, 2);
    </script>
</body>
</html>
