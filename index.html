<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <title>Custom Checkbox Styles</title>
</head>
<body>
  <form id="checkbox-form">
    <p>Salam</p>
    <ul>
        <div id="treeview" class="treeview"></div>
        <script>
            $(document).ready(function(){
                console.log("start");
                $('#treeview').h_tree('h-tree-json','h-tree-selects',":");
                console.log("end");
            });
        </script>
</ul>
  </form>

    <span id="h-tree-json"      style="display:none"></span>
    <span id="h-tree-selects"   style="display:none"></span>
    <span id="h-tree-ext-range" style="display:none"></span>
</body>
<script src="h_tree_check.js"></script>
</html>
